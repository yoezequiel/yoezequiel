name: Update GitHub Stats

on:
    push:
        branches:
            - main
    schedule:
        - cron: "0 0 * * *" # Se ejecuta todos los días a la medianoche (UTC)
    workflow_dispatch: # Permite ejecutar la acción manualmente

permissions:
  contents: write

jobs:
    update-readme:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.10"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install requests lxml python-dateutil

            - name: Run python script
              env:
                  ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
                  USER_NAME: ${{ github.repository_owner }}
              run: python today.py

            - name: Commit and push changes
              run: |
                  git config --local user.email "ezequielcasiano15@gmail.com"
                  git config --local user.name "yoezequiel"
                  git add dark_mode.svg light_mode.svg cache/
                  git commit -m "Update GitHub stats SVG" || exit 0
                  git push
